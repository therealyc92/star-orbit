<style>

}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

  color: var(--text-primary);

}

.container {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto; padding: 20px 24px 60px;
}

/* Header */
.header {
  text-align: center; padding: 32px 0 24px;
  position: relative;
}
.header::before {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);

}
.header-title {
  font-family: var(--font-display); font-size: 32px; font-weight: normal;

.my-sign-bar::before { left: 20px; }

.my-sign-label {

}
.my-sign-trigger {

}
.my-sign-trigger:hover { border-color: var(--gold); }
.my-sign-trigger-text {

}
.my-sign-trigger-arrow {

  max-width: 560px; width: 92%; position: relative;
}
.sign-picker-panel::before {

.sign-picker-card-symbol { font-size: 30px; margin-bottom: 4px; }
.sign-picker-card-name {
  font-size: 13px; color: var(--gold-light); letter-spacing: 1px;
}

}
.sign-picker-close {

  transition: all 0.2s;
}
.sign-picker-close:hover { border-color: var(--gold); background: rgba(212,176,106,0.06); }

  display: none; margin: 32px auto 0; width: 260px; height: 360px;

}
.flip-area.visible { display: block; }

.flip-inner.flipped { transform: rotateY(180deg); }

}
.flip-back {

}

}
.flip-back .back-dimension {

}
.flip-back .back-dim:first-of-type { margin-top: 16px; }
.flip-back .back-dim-label {
  font-size: 12px; color: var(--text-secondary); width: 32px; flex-shrink: 0;
}
.flip-back .back-dim-text {
  font-size: 12px; color: var(--text-primary); flex: 1; line-height: 1.5;
}
.flip-back .back-dim-stars {

}
.flip-back .back-lucky {
  margin-top: 16px; font-size: 11px; color: var(--cyan-dim);

}
.flip-back .back-flip-hint {
  margin-top: 12px; font-size: 10px; color: var(--text-muted); text-align: center;
}

/* Daily Overview */
.daily-overview {
  text-align: center; margin: 32px 0 20px;
  padding: 16px 24px;
  border-top: 1px solid rgba(212,176,106,0.08);
  border-bottom: 1px solid rgba(212,176,106,0.08);
}
.daily-overview-label {
  font-size: 11px; color: var(--text-muted); letter-spacing: 3px; margin-bottom: 6px;
}
.daily-overview-text {
  font-size: 13px; color: var(--text-secondary); max-width: 600px; margin: 0 auto; line-height: 1.7;
}

/* Zodiac Grid */
.zodiac-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  margin-top: 28px;
}
@media (max-width: 900px) {
  .zodiac-grid { grid-template-columns: repeat(3, 1fr); }

@media (max-width: 600px) {

/* Tarot Card */
.tarot-card {
  background: var(--bg-card);

/* Detail Panel */
.detail-overlay {
  position: fixed; inset: 0; background: rgba(8,13,26,0.85);

}
.detail-overlay.open { display: flex; }
.detail-panel {

}
.detail-panel::before {

.detail-close {

}
.detail-close:hover { color: var(--gold-light); }
.detail-header {

}
.detail-symbol-big { font-size: 48px; }

.detail-element-badge {

.btn-compare {

}
.btn-compare:hover { border-color: var(--cyan); background: rgba(77,208,209,0.08); }

.detail-dims { display: flex; flex-direction: column; gap: 16px; }
.dim-row {

.dim-row:hover { border-color: rgba(212,176,106,0.2); }
.dim-icon {

.dim-info { flex: 1; }
.dim-name { font-size: 14px; color: var(--gold-light); margin-bottom: 2px; letter-spacing: 1px; }

.dim-detail { font-size: 13px; color: var(--text-primary); line-height: 1.7; }
.dim-score {

}
.dim-score-num { font-size: 22px; font-family: var(--font-display); color: var(--cyan-light); }
.dim-score-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }

/* Compare Section */
.compare-area {
  margin-top: 28px; padding-top: 20px;
  border-top: 1px solid var(--cyan-dim);

}
.compare-area.visible { display: block; }

/* ===== DATA ===== */

        rx: 80 + Math.random() * 200,
        ry: 30 + Math.random() * 80,
        alpha: 0.02 + Math.random() * 0.06,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    orbitLines.forEach(orbit => {
      ctx.beginPath();
      ctx.ellipse(orbit.cx, orbit.cy, orbit.rx, orbit.ry, 0, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(212,176,106,${orbit.alpha})`;
      ctx.lineWidth = 0.5;
      ctx.setLineDash([4, 20]);
      ctx.lineDashOffset = Date.now() * 0.01 % 24;
      ctx.stroke();
      ctx.setLineDash([]);
    });

    stars.forEach(star => {
      star.alpha += star.speed * star.direction;
      if (star.alpha > 1) { star.alpha = 1; star.direction = -1; }
      if (star.alpha < 0.1) { star.alpha = 0.1; star.direction = 1; }

      ctx.beginPath();
      ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
      const baseColor = star.r > 1.2 ? '212,176,106' : '180,200,220';
      ctx.fillStyle = `rgba(${baseColor},${star.alpha})`;
      ctx.fill();

      if (star.r > 1.4 && star.alpha > 0.6) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${baseColor},${star.alpha * 0.1})`;
        ctx.fill();
      }
    });

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();
})();

// Safe storage: fall back to in-memory when localStorage is blocked (sandboxed preview)
const memoryStore = {};
const storage = {
  get(key) { try { return localStorage.getItem(key); } catch (e) { return memoryStore[key] ?? null; } },
  set(key, val) { try { localStorage.setItem(key, val); } catch (e) { memoryStore[key] = val; } },
  remove(key) { try { localStorage.removeItem(key); } catch (e) { delete memoryStore[key]; } }
};

// Safe analytics: no-op when gtag is unavailable (ad-blocker / sandbox)
function trackEvent(name, params) {
  try {
    if (typeof gtag === 'function') gtag('event', name, params || {});
  } catch (e) { /* tracking must never break the app */ }
}

function renderRadarChart() {
  const canvas = document.getElementById('radar-chart');
  if (!canvas || !detailSignKey || !compareSignKey) return;

    canvas.outerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px;">雷达图加载失败（外部图表库不可用），请参考上方评分条对比。</div>';
    return;
  }

  const s1 = horoscopeData.signs[detailSignKey];
  const s2 = horoscopeData.signs[compareSignKey];
  if (!s1 || !s2) return;

  // Destroy previous chart instance
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();

  const dims = ['career', 'wealth', 'love', 'health'];
  const dimLabels = ['事业', '财运', '感情', '健康'];

  new Chart(canvas, {
    type: 'radar',
    data: {
      labels: dimLabels,
      datasets: [
        {
          label: `${s1.symbol} ${s1.name}`,
          data: dims.map(d => s1[d].score),
          borderColor: '#d4b06a',
          backgroundColor: 'rgba(212,176,106,0.1)',

          pointBackgroundColor: '#d4b06a',
          pointBorderColor: '#d4b06a',

          label: `${s2.symbol} ${s2.name}`,

          borderColor: '#4dd0d1',
          backgroundColor: 'rgba(77,208,209,0.1)',
          borderWidth: 1.5,
          pointBackgroundColor: '#4dd0d1',
          pointBorderColor: '#4dd0d1',
          pointRadius: 3,
          pointHoverRadius: 5,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          beginAtZero: true,
          max: 5,
          ticks: {
            stepSize: 1,
            display: false,
          },
          grid: {
            color: 'rgba(212,176,106,0.1)',
          },
          angleLines: {
            color: 'rgba(212,176,106,0.1)',

            color: '#e4dfd0',

}
